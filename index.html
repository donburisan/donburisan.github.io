<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>どんぶりさんの記録帳</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; background-color: #f9f9f9; margin: 0; padding: 0; }
        header { background-color: #e67e22; color: #fff; padding: 40px 20px; text-align: center; }
        header h1 { margin: 0; font-size: 2.5rem; }
        header p { margin: 10px 0 0 0; opacity: 0.9; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .post { background: #fff; padding: 20px; margin-bottom: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post-date { font-size: 0.85rem; color: #999; }
        .post-title { margin: 5px 0 15px 0; font-size: 1.5rem; color: #e67e22; }
        .category { display: inline-block; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; color: #666; margin-bottom: 10px; }
        footer { text-align: center; padding: 20px; color: #999; background: #f1f1f1; margin-top: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>どんぶりさんの記録帳</h1>
        <p>日々の興味、好きなこと、調べたことを気ままに書き残す場所。</p>
    </header>
    <div class="container">
        <article class="post">
            <div class="post-date">2026年6月25日</div>
            <h2 class="post-title">最初の記録：サイトを開設しました</h2>
            <span class="category">雑記</span>
            <p>今日から「どんぶりさんの記録帳」をスタートします！</p>
            <p>ここには、最近ハマっていることや、新しく知ったこと、日常の些細なメモなどをジャンル問わず雑多に書き残していく予定です。</p>
        </article>
    </div>
    <footer>
        <p>&copy; 2026 どんぶりさんの記録帳</p>
    </footer>
</body>
</html>
